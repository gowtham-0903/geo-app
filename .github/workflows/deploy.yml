name: Test → Build → Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Backend tests ───────────────────────────────────────
  test-backend:
    name: Backend Tests (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          NODE_ENV:      test
          JWT_SECRET:    ${{ secrets.JWT_SECRET || 'ci-test-secret-32-chars-minimum!!' }}
          DB_HOST:       localhost
          DB_USER:       ci_user
          DB_PASSWORD:   ci_pass
          DB_NAME:       ci_db
          CLIENT_ORIGIN: http://localhost:5173

  # ── Job 2: Frontend tests + build ─────────────────────────────
  test-frontend:
    name: Frontend Tests (Vitest) + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  # ── Job 3: Deploy (only on push to main, after tests pass) ────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    # Only deploy on direct push to main (not PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/geo-app

            git pull origin main

            # Build React frontend inside Docker (no Node.js needed on host)
            docker compose --profile build run --rm frontend-builder

            # Rebuild and restart the app container only (MySQL keeps running)
            docker compose up -d --build --no-deps app

            echo "✅ Deployment complete — $(date)"
