<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#001E61" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GEO Packs" />
    <title>GEO Packs</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }
      body { background-color: #F0F2F8; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

      #app-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #F0F2F8;
        z-index: 9999;
      }

      #app-splash img {
        width: 140px;
        height: auto;
        object-fit: contain;
        margin-bottom: 40px;
      }

      .splash-dots {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .splash-dots span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background-color: #001E61;
        animation: splash-bounce 1.2s ease-in-out infinite;
        opacity: 0.3;
      }
      .splash-dots span:nth-child(1) { animation-delay: 0s;    }
      .splash-dots span:nth-child(2) { animation-delay: 0.2s;  }
      .splash-dots span:nth-child(3) { animation-delay: 0.4s;  }

      @keyframes splash-bounce {
        0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
        40%            { transform: scale(1);   opacity: 1;   }
      }

      .splash-label {
        margin-top: 16px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #A2BFFF;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Splash shown before React boots — replaced automatically on mount -->
      <div id="app-splash">
        <img src="/geo-logo.png" alt="GEO Packs" />
        <div class="splash-dots">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <p class="splash-label">Loading&hellip;</p>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
